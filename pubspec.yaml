name: tourist_app
description: "Tourist Safety App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 QR Code
  qr_flutter: ^4.1.0

  # 🔥 SVG support
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # 🔥 ASSETS
  assets:
    - assets/images/icon.svg
    - assets/images/icon2.svg
    - assets/images/icon3.svg